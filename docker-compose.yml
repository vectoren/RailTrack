services:
  db:
    image: postgres:18-alpine
    container_name: rail-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: railtrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: rail-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules # Don't overwrite node_modules with local ones
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://user:password@db:5432/railtrack_db

  frontend:
    build: ./frontend
    container_name: rail-ui
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: